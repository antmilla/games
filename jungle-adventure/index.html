<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Jungle Adventure!</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    background: linear-gradient(180deg, #2d5016 0%, #4a7a30 50%, #6dab4a 100%);
    color: #fff;
    overflow-x: hidden;
  }

  #app {
    max-width: 720px;
    margin: 0 auto;
    padding: 18px;
    text-align: center;
    min-height: 100vh;
  }

  #title {
    font-size: 36px;
    font-weight: bold;
    color: #ffe14c;
    text-shadow: 3px 3px 0 #2d5016, 5px 5px 0 #1a300a;
    margin: 12px 0;
    letter-spacing: 2px;
  }

  #scene {
    background: rgba(255, 255, 255, 0.92);
    color: #2a0033;
    border: 5px solid #ffe14c;
    border-radius: 24px;
    padding: 22px 26px;
    margin-bottom: 20px;
    box-shadow: 0 8px 0 #2d5016;
    animation: slideIn 0.5s ease-out;
    position: relative;
  }
  #scene.sliding-out {
    animation: slideOut 0.45s ease-in forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(80%); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideOut {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(-80%); }
  }

  /* ---- CUTSCENE OVERLAY (full-screen between scenes) ---- */
  #cutscene {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    overflow: hidden;
    cursor: pointer;
    animation: csFadeIn 0.4s ease-out;
  }
  #cutscene.active { display: block; }
  #cutscene.fading-out { animation: csFadeOut 0.4s ease-in forwards; }
  @keyframes csFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes csFadeOut { from { opacity: 1; } to { opacity: 0; } }

  .cs-caption {
    position: absolute;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.78);
    color: #fff5cc;
    border: 4px solid #ffe14c;
    padding: 14px 28px;
    border-radius: 22px;
    font-size: 26px;
    text-align: center;
    font-weight: bold;
    text-shadow: 2px 2px 0 #000;
    max-width: 80%;
    animation: captionPop 0.5s ease-out;
  }
  @keyframes captionPop {
    0%   { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.7); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }

  .cs-walker {
    position: absolute;
    top: 35%;
    left: 50%;
    font-size: 130px;
    transform: translateX(-50%);
    animation: walkerBob 0.5s ease-in-out infinite alternate;
    z-index: 5;
    filter: drop-shadow(0 6px 0 rgba(0,0,0,0.3));
  }
  @keyframes walkerBob {
    from { transform: translateX(-50%) translateY(0); }
    to   { transform: translateX(-50%) translateY(-18px); }
  }

  .cs-zoom-emoji {
    position: absolute;
    top: 38%;
    left: 50%;
    font-size: 220px;
    transform: translate(-50%, -50%) scale(0);
    animation: csZoom 6s ease-out forwards;
    filter: drop-shadow(0 0 30px rgba(255,215,0,0.6));
  }
  @keyframes csZoom {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(-30deg); }
    30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0) rotate(0); }
    50%  { transform: translate(-50%, -50%) scale(1.05) rotate(5deg); }
    70%  { transform: translate(-50%, -50%) scale(1.0) rotate(-5deg); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(0); }
  }

  .cs-particle {
    position: absolute;
    pointer-events: none;
    user-select: none;
  }
  .cs-fall {
    top: -60px;
    animation: csFall var(--dur, 5s) linear infinite;
  }
  @keyframes csFall {
    0%   { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(120vh) rotate(720deg); }
  }
  .cs-fly {
    animation: csFly var(--dur, 4s) linear infinite;
  }
  @keyframes csFly {
    0%   { transform: translateX(-100px); }
    100% { transform: translateX(110vw); }
  }
  .cs-bubble {
    bottom: -40px;
    animation: csBubble var(--dur, 4s) linear infinite;
  }
  @keyframes csBubble {
    0%   { transform: translateY(0) scale(0.6); opacity: 0; }
    20%  { opacity: 0.9; }
    100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
  }

  .cs-skip {
    position: absolute;
    bottom: 18px;
    right: 18px;
    background: rgba(255, 255, 255, 0.9);
    color: #2a0033;
    border: 3px solid #ff5fc6;
    border-radius: 14px;
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
    font-family: inherit;
    z-index: 10;
    box-shadow: 0 3px 0 #80005a;
  }
  .cs-skip:active { transform: translateY(2px); box-shadow: 0 1px 0 #80005a; }

  #art {
    font-size: 60px;
    line-height: 1;
    margin: 6px 0 14px;
    letter-spacing: 6px;
  }

  #text {
    font-size: 22px;
    line-height: 1.5;
    margin-bottom: 14px;
    white-space: pre-line;
    color: #2a0033;
  }

  #ending-title {
    font-size: 32px;
    font-weight: bold;
    color: #c47a00;
    text-shadow: 2px 2px 0 #fff5cc;
    margin: 6px 0 12px;
  }

  #choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .choice-btn {
    font-family: inherit;
    font-size: 22px;
    padding: 18px 22px;
    border: 5px solid #5fa8ff;
    border-radius: 20px;
    background: linear-gradient(#fffacc, #ffe14c);
    color: #4a0033;
    cursor: pointer;
    box-shadow: 0 6px 0 #c47a00;
    text-shadow: 1px 1px 0 #fff5cc;
    transition: transform 0.08s, box-shadow 0.08s;
    font-weight: bold;
  }
  .choice-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #c47a00;
  }
  .choice-btn:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 #c47a00;
  }

  .restart-btn {
    background: linear-gradient(#cdfaff, #5fd9ff);
    border-color: #2c7aa8;
    box-shadow: 0 6px 0 #003d5a;
    color: #002a3d;
    text-shadow: 1px 1px 0 #d6f5ff;
  }
  .restart-btn:active { box-shadow: 0 3px 0 #003d5a; }

  #endings-tracker {
    margin-top: 14px;
    color: #fff5cc;
    font-size: 16px;
    text-shadow: 2px 2px 0 #2d5016;
  }

  /* leaves bg */
  .leaf {
    position: fixed;
    pointer-events: none;
    font-size: 28px;
    animation: float 8s linear infinite;
    z-index: -1;
    opacity: 0.3;
  }
  @keyframes float {
    0% { transform: translateY(-30px) rotate(0deg); }
    100% { transform: translateY(100vh) rotate(360deg); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="title">🌴 JUNGLE ADVENTURE 🦁</div>

  <div id="scene">
    <div id="ending-title" style="display:none;"></div>
    <div id="art"></div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>

  <div id="endings-tracker">Endings found: <span id="endings-count">0</span> / 8</div>
</div>

<div id="cutscene"></div>

<script>
// ---------- THE STORY ----------
const STORY = {
  start: {
    art: '🌴🦜🌿',
    text: 'You step up to the edge of a HUGE magical jungle! 🌿\nA friendly parrot lands on a branch.\n"Hello, explorer! Pick a path!" 🦜',
    choices: [
      { label: '🌿 The MOSSY PATH (looks cozy)', next: 'mossy' },
      { label: '🌺 The FLOWER PATH (smells amazing)', next: 'flower' },
    ],
  },

  // ---- MOSSY PATH ----
  mossy: {
    art: '🌿🐸💧🌿',
    text: 'You walk through soft, squishy moss. You find a sparkly pond and a friendly frog hops out!\n"Want to ride my back across the pond?" 🐸',
    choices: [
      { label: '🐸 Yes! Jump on the frog!', next: 'frog_ride' },
      { label: '🏊 No, swim across yourself', next: 'swim' },
    ],
  },
  frog_ride: {
    art: '🐸✨🏝️',
    text: 'The frog carries you across to a tiny island in the middle of the pond!\nThere\'s a sparkly treasure chest 🎁 right in the center.',
    choices: [
      { label: '🎁 Open the treasure chest!', next: 'ending_crown' },
      { label: '👀 Peek behind the chest first', next: 'ending_turtle' },
    ],
  },
  swim: {
    art: '🏊🐙💧',
    text: 'You dive in and start swimming. Suddenly a friendly octopus grabs your foot! 🐙\n"Hey friend! Where are you headed?"',
    choices: [
      { label: '⬇️ Swim DOWN with the octopus', next: 'ending_octopus' },
      { label: '⬆️ Climb UP a rainbow above the water', next: 'ending_rainbow' },
    ],
  },

  // ---- FLOWER PATH ----
  flower: {
    art: '🌺🦋🌸',
    text: 'You smell the most beautiful flowers ever! A butterfly flutters past you.\n"Follow me!" it says. It leads you to two new paths. 🦋',
    choices: [
      { label: '🐾 Path with paw prints', next: 'paws' },
      { label: '🐘 Path with BIG footprints', next: 'big_feet' },
    ],
  },
  paws: {
    art: '🐾🦁🌴',
    text: 'A friendly lion greets you with a HUGE smile! 🦁\n"Hi friend! Do you like dancing or singing?"',
    choices: [
      { label: '💃 Dance with the lion!', next: 'ending_dance' },
      { label: '🎤 Sing a song instead', next: 'ending_sing' },
    ],
  },
  big_feet: {
    art: '🐘💧🌿',
    text: 'You meet an ADORABLE baby elephant! 🐘\nIt sucks up water in its trunk and giggles...\n"Splash time?" 💦',
    choices: [
      { label: '💦 Get sprayed by the elephant!', next: 'ending_rain' },
      { label: '💧 Spray the elephant back!', next: 'ending_friend' },
    ],
  },

  // ---- ENDINGS ----
  ending_crown: {
    ending: true,
    title: '🏆 GOLDEN CROWN! 🏆',
    art: '👑✨🌟✨👑',
    text: 'Inside the chest is a sparkly GOLDEN CROWN! You put it on your head and sparkles fly everywhere!\nThe parrot bows. "Long live the JUNGLE QUEEN!" 👑',
  },
  ending_turtle: {
    ending: true,
    title: '🐢 WISE TURTLE FRIEND! 🐢',
    art: '🐢🌱✨🌱🐢',
    text: 'Behind the chest, a wise old turtle smiles at you. 🐢\n"Take this magic seed — plant it and it grows whatever you wish for!"',
  },
  ending_octopus: {
    ending: true,
    title: '🐙 OCTOPUS PALACE! 🐙',
    art: '🐙🏰💎🐠',
    text: 'You swim down to a hidden underwater PALACE made of pink coral! 🏰\nThe octopus queen makes you an honorary mermaid! 🧜',
  },
  ending_rainbow: {
    ending: true,
    title: '🌈 RAINBOW CANDY LAND! 🍭',
    art: '🌈🍭🍬🌈',
    text: 'You climb the rainbow all the way up... and slide down into a CANDY LAND! 🍬\nLollipop trees and gumdrop hills as far as you can see! 🍭',
  },
  ending_dance: {
    ending: true,
    title: '💃 LION KING DANCE PARTY! 💃',
    art: '🦁💃🎵🕺',
    text: 'You and the lion dance like nobody\'s watching! 🕺\nAll the jungle animals come out and join in. The biggest dance party ever! 🎉',
  },
  ending_sing: {
    ending: true,
    title: '🎤 JUNGLE MUSIC STAR! 🎤',
    art: '🎤🎵⭐🎵',
    text: 'You sing the most beautiful song! 🎤\nBirds carry your voice all across the world. Now you\'re a jungle music star! ⭐',
  },
  ending_rain: {
    ending: true,
    title: '🌧️ MAGIC RAIN DANCE! 🌧️',
    art: '🌧️🌱🌷🌳',
    text: 'The elephant spray makes magical rain! 🌧️\nFlowers POP up everywhere! The whole jungle dances with you. 🌷',
  },
  ending_friend: {
    ending: true,
    title: '🐘 BEST FRIEND FOREVER! 💖',
    art: '🐘💖👧💖🐘',
    text: 'You and the baby elephant become BEST FRIENDS! 🐘\nThe elephant rides on your shoulder (just kidding, you ride on the elephant!). Adventure buddies forever! 💖',
  },
};

// ---------- STATE ----------
let endingsFound = JSON.parse(localStorage.getItem('jungle-endings') || '[]');
const endingsCountEl = document.getElementById('endings-count');
endingsCountEl.textContent = endingsFound.length;

const artEl = document.getElementById('art');
const textEl = document.getElementById('text');
const choicesEl = document.getElementById('choices');
const titleEl = document.getElementById('ending-title');

// ---------- SOUND ----------
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function tone(freq, dur=0.12, type='sine', vol=0.18) {
  ensureAudio();
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
const sClick = () => tone(660, 0.10, 'square', 0.13);
const sWhoosh = () => { tone(800, 0.20, 'sine', 0.10); setTimeout(() => tone(1200, 0.18, 'sine', 0.08), 100); };
const sEnding = () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'triangle', 0.18), i*100)); };

// ---------- CUTSCENES (full-screen animated scenes between choices) ----------
const cutsceneEl = document.getElementById('cutscene');
const SCENE_DURATION = 6500;   // 6.5 seconds — fits "5-10 second" ask

function addParticles(parent, emojis, count, type = 'fall') {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = `cs-particle cs-${type}`;
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.fontSize = (22 + Math.random() * 26) + 'px';
    p.style.setProperty('--dur', (3 + Math.random() * 4) + 's');
    p.style.animationDelay = (-Math.random() * 4) + 's';
    parent.appendChild(p);
  }
}
function captionEl(text) {
  const c = document.createElement('div');
  c.className = 'cs-caption';
  c.textContent = text;
  return c;
}

// Each builder paints a unique full-screen scene for that transition.
const CUTSCENES = {
  start__mossy(el) {
    el.style.background = 'linear-gradient(180deg, #4a7a30 0%, #2d5016 100%)';
    el.innerHTML = '<div class="cs-walker">🚶‍♀️</div>';
    el.appendChild(captionEl('🌿 Walking the mossy path... 🌿'));
    addParticles(el, ['🍃','🌿','🌱'], 25, 'fall');
    addParticles(el, ['🦋','🐝'], 4, 'fly');
  },
  start__flower(el) {
    el.style.background = 'linear-gradient(180deg, #ffd6f5 0%, #cdfaff 100%)';
    el.innerHTML = '<div class="cs-walker">🚶‍♀️</div>';
    el.appendChild(captionEl('🌺 Skipping through the flowers... 🌷'));
    addParticles(el, ['🌸','🌺','🌷','🌼'], 30, 'fall');
    addParticles(el, ['🦋'], 8, 'fly');
  },
  mossy__frog_ride(el) {
    el.style.background = 'linear-gradient(180deg, #5fa8ff 0%, #2c7aa8 100%)';
    el.innerHTML = '<div class="cs-walker">🐸</div>';
    el.appendChild(captionEl('🐸 Hop hop hop across the pond! 🐸'));
    addParticles(el, ['💧','💦','🫧'], 35, 'bubble');
    addParticles(el, ['🪷'], 5, 'fly');
  },
  mossy__swim(el) {
    el.style.background = 'linear-gradient(180deg, #5fd9ff 0%, #2c7aa8 50%, #003d5a 100%)';
    el.innerHTML = '<div class="cs-walker">🏊</div>';
    el.appendChild(captionEl('🌊 Swimming through deep blue water... 🌊'));
    addParticles(el, ['💧','🫧','💦'], 40, 'bubble');
    addParticles(el, ['🐠','🐟','🐡'], 5, 'fly');
  },
  flower__paws(el) {
    el.style.background = 'linear-gradient(180deg, #ffe14c 0%, #ff8e3c 100%)';
    el.innerHTML = '<div class="cs-walker">🦋</div>';
    el.appendChild(captionEl('🐾 Following the paw prints... 🐾'));
    addParticles(el, ['🐾'], 18, 'fall');
    addParticles(el, ['🌿','🍃'], 18, 'fall');
  },
  flower__big_feet(el) {
    el.style.background = 'linear-gradient(180deg, #ffe14c 0%, #4a7a30 100%)';
    el.innerHTML = '<div class="cs-walker">🦋</div>';
    el.appendChild(captionEl('👣 Following the BIG footprints... 🦣'));
    addParticles(el, ['👣'], 18, 'fall');
    addParticles(el, ['🌳','🌴'], 6, 'fly');
  },

  // ---- Endings (zoom-in reveal cutscenes) ----
  frog_ride__ending_crown(el) {
    el.style.background = 'radial-gradient(circle, #ffd700 0%, #c47a00 60%, #2d5016 100%)';
    el.innerHTML = '<div class="cs-zoom-emoji">👑</div>';
    el.appendChild(captionEl('✨ The treasure chest opens... ✨'));
    addParticles(el, ['✨','🌟','💎','⭐'], 40, 'fall');
  },
  frog_ride__ending_turtle(el) {
    el.style.background = 'linear-gradient(180deg, #4a7a30 0%, #2d5016 100%)';
    el.innerHTML = '<div class="cs-zoom-emoji">🐢</div>';
    el.appendChild(captionEl('🌱 A wise turtle appears! 🐢'));
    addParticles(el, ['🌿','🌱','✨'], 28, 'fall');
  },
  swim__ending_octopus(el) {
    el.style.background = 'radial-gradient(circle, #ff5fc6 0%, #80005a 60%, #2a0033 100%)';
    el.innerHTML = '<div class="cs-zoom-emoji">🐙</div>';
    el.appendChild(captionEl('🏰 Down to the octopus palace! 🏰'));
    addParticles(el, ['💎','🐠','🪸','🫧'], 30, 'bubble');
  },
  swim__ending_rainbow(el) {
    el.style.background = 'linear-gradient(180deg, #ff5fc6 0%, #ffd700 30%, #5fd96b 60%, #5fa8ff 90%)';
    el.innerHTML = '<div class="cs-zoom-emoji">🌈</div>';
    el.appendChild(captionEl('🍭 Up the rainbow to candy land! 🍬'));
    addParticles(el, ['🍬','🍭','🍫','🍰','🍩'], 35, 'fall');
  },
  paws__ending_dance(el) {
    el.style.background = 'linear-gradient(180deg, #ff5fc6 0%, #c46bff 100%)';
    el.innerHTML = '<div class="cs-zoom-emoji">💃</div>';
    el.appendChild(captionEl('🦁 The DANCE PARTY begins! 🕺'));
    addParticles(el, ['🎵','🎶','✨','💖'], 35, 'fall');
  },
  paws__ending_sing(el) {
    el.style.background = 'linear-gradient(180deg, #ffd6f5 0%, #cdfaff 100%)';
    el.innerHTML = '<div class="cs-zoom-emoji">🎤</div>';
    el.appendChild(captionEl('🎵 Singing across the jungle... 🎶'));
    addParticles(el, ['🎵','🎶','✨','⭐'], 35, 'fall');
  },
  big_feet__ending_rain(el) {
    el.style.background = 'linear-gradient(180deg, #5fa8ff 0%, #2c7aa8 50%, #4a7a30 100%)';
    el.innerHTML = '<div class="cs-zoom-emoji">🌧️</div>';
    el.appendChild(captionEl('🌷 Magic rain makes flowers POP! 🌷'));
    addParticles(el, ['💧','💦','🌷','🌼','🌸'], 40, 'fall');
  },
  big_feet__ending_friend(el) {
    el.style.background = 'linear-gradient(180deg, #ffd6f5 0%, #ffe14c 100%)';
    el.innerHTML = '<div class="cs-zoom-emoji">🐘</div>';
    el.appendChild(captionEl('💖 Best friends FOREVER! 💖'));
    addParticles(el, ['💖','💕','✨','🌟'], 35, 'fall');
  },

  // Restart from any ending → start
  restart(el) {
    el.style.background = 'linear-gradient(180deg, #2d5016 0%, #6dab4a 100%)';
    el.innerHTML = '<div class="cs-zoom-emoji">🌴</div>';
    el.appendChild(captionEl('🔄 A new adventure begins... 🌴'));
    addParticles(el, ['🍃','🌿','✨'], 22, 'fall');
  },
};

let cutsceneTimer = null;
function playCutscene(fromId, toId, onDone) {
  const key = `${fromId}__${toId}`;
  let builder = CUTSCENES[key];
  if (!builder) {
    // fallback: if going to start, treat as restart; otherwise default
    if (toId === 'start') builder = CUTSCENES.restart;
    else builder = CUTSCENES.start__mossy;   // generic walking scene
  }
  cutsceneEl.innerHTML = '';
  cutsceneEl.classList.remove('fading-out');
  cutsceneEl.classList.add('active');
  cutsceneEl.style.background = '';
  builder(cutsceneEl);

  // skip button (tap anywhere also skips)
  const skip = document.createElement('button');
  skip.className = 'cs-skip';
  skip.textContent = '⏭ skip';
  cutsceneEl.appendChild(skip);

  let finished = false;
  const finish = () => {
    if (finished) return;
    finished = true;
    clearTimeout(cutsceneTimer);
    cutsceneEl.classList.add('fading-out');
    setTimeout(() => {
      cutsceneEl.classList.remove('active', 'fading-out');
      cutsceneEl.innerHTML = '';
      onDone();
    }, 400);
  };
  cutsceneEl.onclick = finish;
  skip.onclick = (e) => { e.stopPropagation(); finish(); };

  cutsceneTimer = setTimeout(finish, SCENE_DURATION);
}

let currentNodeId = 'start';
function transitionTo(nodeId) {
  const fromId = currentNodeId;
  currentNodeId = nodeId;
  playCutscene(fromId, nodeId, () => render(nodeId));
}

// ---------- RENDERING ----------
function render(nodeId) {
  const node = STORY[nodeId];
  if (!node) return;

  // Animation reset
  const sceneEl = document.getElementById('scene');
  sceneEl.style.animation = 'none';
  void sceneEl.offsetWidth;     // reflow
  sceneEl.style.animation = 'fadeIn 0.5s ease-out';

  if (node.ending) {
    titleEl.style.display = 'block';
    titleEl.textContent = node.title;
    artEl.textContent = node.art;
    textEl.textContent = node.text;
    choicesEl.innerHTML = '';

    // restart button
    const btn = document.createElement('button');
    btn.className = 'choice-btn restart-btn';
    btn.textContent = '🔄 START A NEW ADVENTURE!';
    btn.onclick = () => { sClick(); transitionTo('start'); };
    choicesEl.appendChild(btn);

    // mark ending found
    if (!endingsFound.includes(nodeId)) {
      endingsFound.push(nodeId);
      localStorage.setItem('jungle-endings', JSON.stringify(endingsFound));
      endingsCountEl.textContent = endingsFound.length;
    }
    sEnding();
    return;
  }

  // regular scene
  titleEl.style.display = 'none';
  artEl.textContent = node.art;
  textEl.textContent = node.text;
  choicesEl.innerHTML = '';
  node.choices.forEach((c) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = () => { ensureAudio(); sClick(); transitionTo(c.next); };
    choicesEl.appendChild(btn);
  });
}

// ---------- LEAVES BACKGROUND ----------
function spawnLeaf() {
  const leaf = document.createElement('div');
  leaf.className = 'leaf';
  leaf.textContent = ['🍃', '🌿', '🍀'][Math.floor(Math.random() * 3)];
  leaf.style.left = (Math.random() * 100) + 'vw';
  leaf.style.animationDuration = (6 + Math.random() * 6) + 's';
  document.body.appendChild(leaf);
  setTimeout(() => leaf.remove(), 14000);
}
setInterval(spawnLeaf, 800);

// ---------- START ----------
render('start');
</script>
</body>
