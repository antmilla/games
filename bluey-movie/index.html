<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Bluey & Bingo's Big Day — A Movie</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
  }

  #stage {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    transition: background 0.8s ease-in-out;
  }

  /* progress bar across the top */
  #progress {
    position: absolute;
    top: 0; left: 0;
    height: 6px;
    width: 0%;
    background: linear-gradient(90deg, #ff5fc6, #ffe14c, #5fd96b, #5fa8ff);
    z-index: 50;
    transition: width 0.1s linear;
  }
  #scene-indicator {
    position: absolute;
    top: 14px; left: 14px;
    z-index: 50;
    background: rgba(0,0,0,0.6);
    color: #fff5cc;
    padding: 6px 14px;
    border-radius: 12px;
    font-size: 14px;
    border: 2px solid #ffe14c;
  }

  /* movie controls */
  #controls {
    position: absolute;
    top: 14px; right: 14px;
    z-index: 50;
    display: flex;
    gap: 8px;
  }
  .ctrl {
    background: rgba(255,255,255,0.9);
    color: #2a0033;
    border: 2px solid #ff5fc6;
    border-radius: 12px;
    padding: 8px 14px;
    font-family: inherit;
    cursor: pointer;
    font-size: 16px;
    box-shadow: 0 3px 0 #80005a;
  }
  .ctrl:active { transform: translateY(2px); box-shadow: 0 1px 0 #80005a; }

  /* generic stage elements */
  .actor {
    position: absolute;
    user-select: none;
    pointer-events: none;
    filter: drop-shadow(0 8px 0 rgba(0,0,0,0.25));
  }
  .caption {
    position: absolute;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.78);
    color: #fff5cc;
    border: 4px solid #ffe14c;
    padding: 14px 26px;
    border-radius: 22px;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 0 #000;
    z-index: 20;
    text-align: center;
    max-width: 80%;
    animation: capPop 0.6s ease-out;
  }
  @keyframes capPop {
    0%   { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.7); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }
  .title-text {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 56px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 3px 3px 0 #2a0033, 5px 5px 0 #80005a;
    z-index: 20;
    text-align: center;
    animation: titlePop 1s ease-out;
  }
  @keyframes titlePop {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.3); }
    60%  { opacity: 1; transform: translateX(-50%) scale(1.1); }
    100% { opacity: 1; transform: translateX(-50%) scale(1); }
  }
  .subtitle-text {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    color: #fff5cc;
    text-shadow: 2px 2px 0 #2a0033;
    z-index: 20;
    animation: capPop 1.2s ease-out;
    animation-delay: 0.5s;
    animation-fill-mode: both;
  }

  /* animations */
  .breathe { animation: breathe 2.5s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  .bob { animation: bob 1.2s ease-in-out infinite alternate; }
  @keyframes bob { from { transform: translateY(0); } to { transform: translateY(-12px); } }

  .stretch { animation: stretch 4s ease-in-out infinite; }
  @keyframes stretch {
    0% { transform: scaleX(1) scaleY(1); }
    50% { transform: scaleX(1.3) scaleY(0.85); }
    100% { transform: scaleX(1) scaleY(1); }
  }

  .walk { animation: walkAcross 4s linear infinite, bob 0.5s ease-in-out infinite alternate; }
  @keyframes walkAcross {
    from { left: -100px; }
    to { left: 110vw; }
  }

  .fly-across {
    animation: flyAcross var(--dur, 5s) linear infinite;
  }
  @keyframes flyAcross {
    0% { transform: translateX(-100px) translateY(var(--y-start, 0)); }
    50% { transform: translateX(50vw) translateY(calc(var(--y-start, 0) - 20px)); }
    100% { transform: translateX(110vw) translateY(var(--y-start, 0)); }
  }

  .rain-drop {
    position: absolute;
    top: -30px;
    color: #5fa8ff;
    font-size: 24px;
    animation: rainFall var(--dur, 1.4s) linear infinite;
  }
  @keyframes rainFall {
    0% { transform: translateY(0) rotate(15deg); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(15deg); opacity: 0.2; }
  }

  .twinkle {
    animation: twinkle 1.8s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 1; transform: scale(1.1); } }

  .float-up {
    animation: floatUp var(--dur, 3s) ease-out infinite;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-220px) scale(1.4); }
  }

  .chase { animation: chaseRun 0.6s ease-in-out infinite alternate; }
  @keyframes chaseRun { from { transform: translateY(0) rotate(-3deg); } to { transform: translateY(-10px) rotate(3deg); } }

  .pop-in { animation: popIn 0.8s ease-out forwards; }
  @keyframes popIn {
    0% { opacity: 0; transform: scale(0); }
    60% { opacity: 1; transform: scale(1.15); }
    100% { opacity: 1; transform: scale(1); }
  }

  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 25%;
  }
  .grass-ground {
    background: linear-gradient(180deg, #6dab4a 0%, #2d5016 100%);
  }
  .floor-ground {
    background: linear-gradient(180deg, #c4956b 0%, #8b5a3c 100%);
  }
  .sky-ground { display:none; }

  /* The end card */
  #the-end {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    color: #ffd700;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    animation: capPop 1s ease-out;
  }
  #the-end h1 {
    font-size: 72px;
    margin: 0 0 12px;
    text-shadow: 3px 3px 0 #80005a, 6px 6px 0 #2a0033;
  }
  #the-end p { font-size: 22px; color: #fff5cc; margin: 4px 0; }
  #the-end button {
    margin-top: 24px;
    background: linear-gradient(#ffd6f5, #ff8ed4);
    color: #4a0033;
    border: 4px solid #ff5fc6;
    border-radius: 18px;
    padding: 14px 30px;
    font-family: inherit;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #80005a;
  }

  #start-screen {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #003d5a 0%, #2c7aa8 40%, #5fd9ff 100%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff;
  }
  #start-screen h1 {
    font-size: 72px;
    margin: 0 0 16px;
    color: #ffd700;
    text-shadow: 3px 3px 0 #2a0033, 6px 6px 0 #4a0033;
    animation: titlePop 1s ease-out;
  }
  #start-screen p {
    font-size: 24px;
    margin: 6px 0;
    text-shadow: 2px 2px 0 #2a0033;
  }
  #start-screen button {
    margin-top: 24px;
    background: linear-gradient(#ffe14c, #ffaa00);
    color: #4a0033;
    border: 5px solid #c47a00;
    border-radius: 22px;
    padding: 22px 50px;
    font-family: inherit;
    font-size: 36px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 0 #80005a;
    text-shadow: 1px 1px 0 #fff5cc;
    animation: bob 1.6s ease-in-out infinite alternate;
  }
  #start-screen button:active { transform: translateY(4px); box-shadow: 0 4px 0 #80005a; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="stage">
  <div id="progress"></div>
  <div id="scene-indicator">Scene 1</div>
  <div id="controls">
    <button class="ctrl" id="pause-btn">⏸ Pause</button>
    <button class="ctrl" id="restart-btn">🔄 Restart</button>
  </div>

  <div id="scene-content"></div>

  <div id="the-end" class="hidden">
    <h1>🎬 THE END 🎬</h1>
    <p>🐶💙 What a wackadoo day! 🧡🐶</p>
    <button id="replay-btn">▶ Watch Again</button>
  </div>

  <div id="start-screen">
    <h1>💙🐶 BLUEY & BINGO'S BIG DAY 🐶🧡</h1>
    <p>A movie with sound and voice! 🎙️</p>
    <button id="start-btn">▶ START THE MOVIE</button>
    <button id="test-voice-btn" style="margin-top:12px;font-size:22px;background:linear-gradient(#cdfaff,#5fd9ff);border-color:#2c7aa8;color:#002a3d;box-shadow:0 6px 0 #003d5a;">🔊 Test Voice First</button>
    <p id="voice-status" style="font-size: 16px; opacity: 0.8; margin-top: 18px;">Make sure your sound is on! 🔊</p>
  </div>
</div>

<script>
const stage = document.getElementById('stage');
const sceneEl = document.getElementById('scene-content');
const progressBar = document.getElementById('progress');
const sceneIndicator = document.getElementById('scene-indicator');
const theEnd = document.getElementById('the-end');

// ---- Narration (text-to-speech) ----
const synth = window.speechSynthesis;
let preferredVoice = null;

function pickVoice() {
  if (!synth) return;
  const voices = synth.getVoices();
  if (!voices.length) return;
  // Prefer a friendly female English voice; fall back to any English voice.
  preferredVoice =
    voices.find(v => /samantha|karen|moira|tessa|ava|allison|google.*us.*english.*female|female/i.test(v.name) && v.lang.startsWith('en'))
    || voices.find(v => v.lang.startsWith('en'))
    || voices[0];
  console.log('TTS: picked voice =', preferredVoice && preferredVoice.name, '/', preferredVoice && preferredVoice.lang);
}

if (synth) {
  pickVoice();
  // Some browsers (Chrome) load voices asynchronously
  synth.addEventListener('voiceschanged', pickVoice);
  console.log('TTS: synth available, initial voices =', synth.getVoices().length);
} else {
  console.warn('TTS: speechSynthesis NOT available in this browser');
}

// Play a real human-voice MP3 file (pre-generated for each scene).
let currentVoiceAudio = null;
function playVoiceFile(src) {
  if (currentVoiceAudio) {
    currentVoiceAudio.pause();
    currentVoiceAudio.currentTime = 0;
    currentVoiceAudio = null;
  }
  if (!src) return;
  const audio = new Audio(src);
  audio.volume = 1.0;
  audio.play().catch(e => {
    console.warn('Voice MP3 play failed; falling back to kitty boops:', e);
    speakKitty(audio._fallbackText || 'meow meow');
  });
  currentVoiceAudio = audio;
}

function speak(text) {
  // We use pre-recorded MP3 voice files (loadScene plays them by scene index).
  // This fallback only fires for ad-hoc lines (test button, "the end" voice).
  speakKitty(text);
}

// Animal-Crossing-style "kitty voice" — cute musical babble
// timed to the rhythm of the words. Doesn't say real words but feels like talking.
function speakKitty(text) {
  ensureAudio();
  if (!audioCtx || !text) return;
  // strip emojis and punctuation, split into words
  const clean = text.replace(/[^\w\s']/g, ' ').replace(/\s+/g, ' ').trim();
  if (!clean) return;
  const words = clean.split(' ');
  let when = 0;
  for (const word of words) {
    // estimate syllables — roughly every 2-3 letters
    const syllables = Math.max(1, Math.min(4, Math.round(word.length / 2.5)));
    // pick a base pitch for this word — ends of sentences trend down
    const isLast = word === words[words.length - 1];
    const basePitch = isLast ? 380 + Math.random() * 80 : 460 + Math.random() * 160;
    for (let i = 0; i < syllables; i++) {
      const c = word[Math.min(i * 2, word.length - 1)] || word[0];
      const isVowel = /[aeiouy]/i.test(c);
      // vowels chirp higher, consonants sit lower; tiny random wobble
      const pitch = basePitch * (isVowel ? 1.18 : 0.88) * (1 + (Math.random() - 0.5) * 0.08);
      tone(pitch, 0.12, 'triangle', 0.10, when);
      when += 0.13;
    }
    when += 0.08;     // pause between words
  }
}

// ---- Sound (gentle ambient + key effects) ----
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function tone(freq, dur=0.18, type='sine', vol=0.12, when=0) {
  ensureAudio();
  if (!audioCtx) return;
  const t = audioCtx.currentTime + when;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(t); o.stop(t + dur);
}
const sChime = () => { tone(523, 0.3, 'triangle', 0.1); tone(659, 0.3, 'triangle', 0.1, 0.1); tone(784, 0.4, 'triangle', 0.1, 0.2); };
const sYawn = () => { tone(220, 0.7, 'sine', 0.1); tone(330, 0.5, 'sine', 0.08, 0.4); };
const sNom = () => { for (let i = 0; i < 4; i++) tone(400 + Math.random()*300, 0.06, 'square', 0.08, i*0.1); };
const sPurr = () => { tone(110, 1.5, 'triangle', 0.06); };
const sFlute = () => { tone(880, 0.18, 'triangle', 0.12); tone(1047, 0.18, 'triangle', 0.12, 0.18); tone(784, 0.28, 'triangle', 0.12, 0.36); };
const sChirp = () => { tone(1200, 0.08, 'square', 0.1); tone(1500, 0.08, 'square', 0.1, 0.1); };
const sRain = () => {
  for (let i = 0; i < 30; i++) tone(200 + Math.random()*400, 0.04, 'sine', 0.04, i*0.08);
};
const sCozy = () => { tone(523, 0.4, 'sine', 0.1); tone(659, 0.4, 'sine', 0.1, 0.2); tone(784, 0.5, 'sine', 0.1, 0.4); tone(1047, 0.7, 'sine', 0.1, 0.6); };

// ---- Scene helpers ----
function emoji(text, opts = {}) {
  const e = document.createElement('div');
  e.className = 'actor ' + (opts.cls || '');
  e.textContent = text;
  if (opts.size) e.style.fontSize = opts.size;
  if (opts.top !== undefined) e.style.top = opts.top;
  if (opts.left !== undefined) e.style.left = opts.left;
  if (opts.right !== undefined) e.style.right = opts.right;
  if (opts.bottom !== undefined) e.style.bottom = opts.bottom;
  if (opts.delay) e.style.animationDelay = opts.delay;
  if (opts.dur) e.style.setProperty('--dur', opts.dur);
  if (opts.yStart) e.style.setProperty('--y-start', opts.yStart);
  if (opts.zIndex) e.style.zIndex = opts.zIndex;
  if (opts.transform) e.style.transform = opts.transform;
  return e;
}
function caption(text) {
  const c = document.createElement('div');
  c.className = 'caption';
  c.textContent = text;
  return c;
}
function ground(cls) {
  const g = document.createElement('div');
  g.className = 'ground ' + cls;
  return g;
}

// ---- The Movie: 9 scenes (BLUEY edition) ----
// Helper to put a colored "halo" behind a character so we can tell who's who.
// Bluey = blue, Bingo = orange, Mum = peach, Dad = navy.
const COLORS = {
  bluey:  'rgba(95,168,255,0.7)',
  bingo:  'rgba(255,142,60,0.7)',
  mum:    'rgba(255,178,140,0.7)',
  dad:    'rgba(50,90,160,0.7)',
};
function pup(who, opts = {}) {
  // Bluey + Bingo are puppies, Mum + Dad are bigger
  const ch = (who === 'mum' || who === 'dad') ? '🐕' : '🐶';
  const e = emoji(ch, opts);
  e.style.background = `radial-gradient(circle, ${COLORS[who]} 0%, transparent 65%)`;
  e.style.borderRadius = '50%';
  return e;
}

const SCENES = [
  // 1. Title
  {
    name: 'Scene 1: Sunrise',
    duration: 5500,
    narration: "Bluey and Bingo's Big Day! A movie.",
    bg: 'linear-gradient(180deg, #003d5a 0%, #2c7aa8 30%, #ff8e3c 70%, #ffe14c 100%)',
    build(el) {
      sChime();
      for (let i = 0; i < 12; i++) {
        const s = emoji('⭐', { cls: 'twinkle', size: '20px' });
        s.style.top = (Math.random() * 30) + 'vh';
        s.style.left = (Math.random() * 100) + 'vw';
        s.style.animationDelay = (Math.random() * 2) + 's';
        el.appendChild(s);
      }
      const sun = emoji('☀️', { cls: 'breathe', size: '180px', top: '38%', left: '50%', transform: 'translate(-50%, -50%)' });
      el.appendChild(sun);
      const house = emoji('🏡', { size: '130px', bottom: '12%', left: '60%' });
      el.appendChild(house);
      const title = document.createElement('div');
      title.className = 'title-text';
      title.textContent = '💙 BLUEY & BINGO 🧡';
      el.appendChild(title);
      const sub = document.createElement('div');
      sub.className = 'subtitle-text';
      sub.textContent = "✨ A Big Day Movie ✨";
      el.appendChild(sub);
    },
  },

  // 2. Wake up
  {
    name: 'Scene 2: Wake Up',
    duration: 6000,
    narration: "Wake up, Bingo! Let's play!",
    bg: 'linear-gradient(180deg, #6a4ae0 0%, #c46bff 50%, #ffd6f5 100%)',
    build(el) {
      sYawn();
      el.appendChild(ground('floor-ground'));
      const bed = emoji('🛏️', { size: '210px', bottom: '14%', left: '50%', transform: 'translateX(-50%)' });
      el.appendChild(bed);
      // Bluey JUMPING on the bed
      const bluey = pup('bluey', { cls: 'bob', size: '95px', bottom: '38%', left: '38%' });
      bluey.style.zIndex = 5;
      el.appendChild(bluey);
      // Bingo still sleepy
      const bingo = pup('bingo', { cls: 'breathe', size: '90px', bottom: '32%', left: '60%' });
      bingo.style.zIndex = 5;
      bingo.style.animationDelay = '0.3s';
      el.appendChild(bingo);
      for (let i = 0; i < 4; i++) {
        const z = emoji('💤', { cls: 'float-up', size: '32px', bottom: '46%', left: '64%', dur: '2.5s' });
        z.style.animationDelay = (i * 0.6) + 's';
        el.appendChild(z);
      }
      el.appendChild(caption('💙 Wake up, Bingo!'));
    },
  },

  // 3. Brekkie
  {
    name: 'Scene 3: Brekkie',
    duration: 5500,
    narration: "Brekkie time! Mum made pancakes.",
    bg: 'linear-gradient(180deg, #ffe14c 0%, #ffd6a3 100%)',
    build(el) {
      setTimeout(sNom, 500);
      setTimeout(sNom, 1900);
      setTimeout(sNom, 3300);
      el.appendChild(ground('floor-ground'));
      const table = emoji('🍽️', { size: '160px', bottom: '18%', left: '50%', transform: 'translateX(-50%)' });
      el.appendChild(table);
      const pancakes = emoji('🥞', { size: '70px', bottom: '30%', left: '50%', transform: 'translateX(-50%)' });
      el.appendChild(pancakes);
      // Mum
      const mum = pup('mum', { cls: 'bob', size: '105px', bottom: '30%', left: '20%' });
      el.appendChild(mum);
      // Bluey
      const bluey = pup('bluey', { cls: 'bob', size: '90px', bottom: '32%', left: '38%' });
      bluey.style.animationDelay = '0.2s';
      el.appendChild(bluey);
      // Bingo
      const bingo = pup('bingo', { cls: 'bob', size: '90px', bottom: '32%', left: '64%' });
      bingo.style.animationDelay = '0.4s';
      el.appendChild(bingo);
      for (let i = 0; i < 6; i++) {
        const h = emoji('💖', { cls: 'float-up', size: '28px', bottom: '50%', left: (35 + Math.random()*30) + '%', dur: '2.5s' });
        h.style.animationDelay = (i * 0.4) + 's';
        el.appendChild(h);
      }
      el.appendChild(caption('🥞 Brekkie with Mum!'));
    },
  },

  // 4. Backyard
  {
    name: 'Scene 4: Backyard',
    duration: 6000,
    narration: "Outside in the back garden! Whee!",
    bg: 'linear-gradient(180deg, #5fa8ff 0%, #cdfaff 50%, #bff5b5 100%)',
    build(el) {
      sFlute();
      el.appendChild(ground('grass-ground'));
      const sun = emoji('☀️', { cls: 'breathe', size: '90px', top: '12%', left: '15%' });
      el.appendChild(sun);
      const tree = emoji('🌳', { size: '180px', bottom: '15%', left: '8%' });
      el.appendChild(tree);
      const house = emoji('🏡', { size: '130px', bottom: '20%', right: '6%' });
      el.appendChild(house);
      // Bluey running
      const bluey = pup('bluey', { cls: 'walk', size: '100px', bottom: '20%' });
      bluey.style.animationDuration = '3.5s, 0.4s';
      el.appendChild(bluey);
      // Bingo running behind
      const bingo = pup('bingo', { cls: 'walk', size: '90px', bottom: '20%' });
      bingo.style.animationDuration = '4s, 0.4s';
      bingo.style.animationDelay = '0.5s';
      el.appendChild(bingo);
      for (let i = 0; i < 3; i++) {
        const bf = emoji('🦋', { cls: 'fly-across', size: '40px', top: (25 + i*8) + '%', dur: (5 + i) + 's' });
        bf.style.animationDelay = (i * 0.5) + 's';
        el.appendChild(bf);
      }
      el.appendChild(caption('🌳 Outside! Whee!'));
    },
  },

  // 5. Magic stick game
  {
    name: 'Scene 5: Magic Stick',
    duration: 7000,
    narration: "Magic stick! Now you're a frog! Boing boing!",

// ---- Movie engine ----
let sceneIdx = 0;
let sceneStart = 0;
let paused = false;
let pauseAccum = 0;
let pauseStart = 0;
let rafId = null;

function totalDuration() { return SCENES.reduce((a, s) => a + s.duration, 0); }

function loadScene(i) {
  if (i >= SCENES.length) {
    showTheEnd();
    return;
  }
  sceneIdx = i;
  const s = SCENES[i];
  stage.style.background = s.bg;
  sceneEl.innerHTML = '';
  s.build(sceneEl);
  sceneIndicator.textContent = `Scene ${i + 1} of ${SCENES.length}`;
  sceneStart = performance.now();
  pauseAccum = 0;
  // narrate using the pre-recorded MP3 for this scene
  playVoiceFile(`voice/scene${i + 1}.mp3`);
}

function step(now) {
  if (!paused) {
    const elapsed = now - sceneStart - pauseAccum;
    const s = SCENES[sceneIdx];
    if (elapsed >= s.duration) {
      loadScene(sceneIdx + 1);
    }
    // overall progress
    let totalElapsed = 0;
    for (let i = 0; i < sceneIdx; i++) totalElapsed += SCENES[i].duration;
    totalElapsed += Math.min(elapsed, s ? s.duration : 0);
    progressBar.style.width = (totalElapsed / totalDuration() * 100) + '%';
  }
  rafId = requestAnimationFrame(step);
}

function showTheEnd() {
  theEnd.classList.remove('hidden');
  progressBar.style.width = '100%';
  cancelAnimationFrame(rafId);
  rafId = null;
  if (synth) synth.cancel();
  playVoiceFile('voice/scene_end.mp3');
}

function startMovie() {
  ensureAudio();
  if (synth) synth.cancel();
  theEnd.classList.add('hidden');
  loadScene(0);
  if (!rafId) rafId = requestAnimationFrame(step);
}

document.getElementById('pause-btn').addEventListener('click', (e) => {
  paused = !paused;
  if (paused) {
    pauseStart = performance.now();
    e.target.textContent = '▶ Play';
    if (synth) synth.pause();
  } else {
    pauseAccum += performance.now() - pauseStart;
    e.target.textContent = '⏸ Pause';
    if (synth) synth.resume();
  }
});

document.getElementById('restart-btn').addEventListener('click', startMovie);
document.getElementById('replay-btn').addEventListener('click', startMovie);

// Click-to-start screen ensures the browser allows audio + speech
const startScreen = document.getElementById('start-screen');
const voiceStatus = document.getElementById('voice-status');

document.getElementById('test-voice-btn').addEventListener('click', () => {
  ensureAudio();

  voiceStatus.style.color = '#bff5b5';
  playVoiceFile('voice/scene1.mp3');
});

document.getElementById('start-btn').addEventListener('click', () => {
  ensureAudio();
  startScreen.classList.add('hidden');
  startMovie();
});
