<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        #gameContainer {
            text-align: center;
        }
        canvas {
            border: 4px solid #00ff00;
            background: #000;
        }
        #ui {
            background: rgba(0,255,0,0.2);
            color: #00ff00;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
            font-size: 24px;
            display: flex;
            justify-content: space-around;
            border: 2px solid #00ff00;
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            color: #00ff00;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 4px solid #00ff00;
        }
        #gameOver h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        #gameOver button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        #gameOver button:hover {
            background: #00cc00;
        }
        #instructions {
            background: rgba(0,255,0,0.2);
            color: #00ff00;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            font-size: 16px;
            border: 2px solid #00ff00;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>Score: <span id="score">0</span></div>
            <div>Health: <span id="health">100</span></div>
            <div>Wave: <span id="wave">1</span></div>
        </div>
        <div id="instructions">
            Arrow Keys or WASD to Move | Auto-Shoot Enabled | P or ESC to Pause | Destroy all enemies!
        </div>
        <div id="gameOver">
            <h1>Game Over!</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
